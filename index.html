<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashBoard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f4f6f9;
        color: #333;
      }

      .container {
        display: flex;
        min-height: 100vh;
      }
      nav {
        width: 250px;
        background-color: #1e293b;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      nav a {
        color: #cbd5e1;
        text-decoration: none;
        padding: 12px 15px;
        border-radius: 6px;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      nav a:hover {
        background-color: #334155;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <h2>DashBoard</h2>
    <div class="conatainer">
      <nav>
        <a href="#">Home</a><br />
        <a href="#">Users</a><br />
        <a href="#">products</a><br />
        <a href="#">Analytics</a><br />
        <a href="#">settings</a><br />
        <a href="#">Logout</a><br />
      </nav>
      <header>
        <h1>Dashboard</h1>

        <div>
          <input type="text" placeholder="Search" />
          <button>🔔</button>
        </div>
      </header>
    </div>
  </body>
  <h1>New Branch Test</h1>
</html>
